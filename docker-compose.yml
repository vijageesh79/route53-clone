services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: production
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: sqlite:////app/route53.db
      COOKIE_SECURE: "false"
    volumes:
      - backend-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  backend-data:
